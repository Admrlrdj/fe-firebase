<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link href="vendor/bootstrap/bootstrap.min.css" rel="stylesheet" />
    <link href="vendor/fontawesome/fontawesome.min.css" rel="stylesheet">
    <!-- <link href="vendor/fontawesome/all.min.css" rel="stylesheet"> -->
    <script src="vendor/fontawesome/fontawesome.min.js"></script>
    <script src="vendor/fontawesome/all.min.js"></script>
    <script src="vendor/jquery/jquery-4.0.0.min.js"></script>
</head>

<body>
    <div class="container">
        <h1>Mahasiswa</h1>
        <button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#mahasiswaModal" id="add"><i class="fas fa-plus"></i> Tambah</button>
        <button class="btn btn-danger mb-3" id="pdf"><i class="fas fa-file-pdf"></i> Export PDF</button>
        <button class="btn btn-success mb-3" id="excel"><i class="fas fa-file-excel"></i> Export Excel</button>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>NIM</th>
                    <th>Nama</th>
                    <th>Jenis Kelamin</th>
                    <th>Usia</th>
                    <th>Program Studi</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="mahasiswa-table-body">
                <tr>
                </tr>
            </tbody>
        </table>
        
        <div class="modal fade" id="mahasiswaModal" tabindex="-1" aria-labelledby="mahasiswaModalLabel"
            aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title" id="mahasiswaModalLabel">Tambah Data Mahasiswa</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="add-mahasiswa-form">
                            <div class="mb-3">
                                <label for="add-nim" class="form-label">NIM</label>
                                <input type="text" class="form-control" id="add-nim" required>
                            </div>
                            <div class="mb-3">
                                <label for="add-nama" class="form-label">Nama</label>
                                <input type="text" class="form-control" id="add-nama" required>
                            </div>
                            <div class="mb-3">
                                <label for="add-jk" class="form-label">Jenis Kelamin</label>
                                <select class="form-select" id="add-jk" required>
                                    <option value="Laki-laki">Laki-laki</option>
                                    <option value="Perempuan">Perempuan</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="add-usia" class="form-label">Usia</label>
                                <input type="number" class="form-control" id="add-usia" required>
                            </div>
                            <div class="mb-3">
                                <label for="add-prodi" class="form-label">Program Studi</label>
                                <select class="form-select" id="add-prodi" required>
                                    <option value="">-- Pilih Program Studi --</option>
                                    <option value="TRPL">Teknologi Rekayasa Perangkat Lunak</option>
                                    <option value="INF">Informatika</option>
                                    <option value="SI">Sistem Informasi</option>
                                </select>
                            </div>
                            <div class="modal-footer px-0 pb-0">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                                <button type="submit" class="btn btn-primary">Simpan</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

    <script src="vendor/bootstrap/bootstrap.bundle.min.js"></script>
    <script src="js/mahasiswa.js"></script>
</body>

</html>
